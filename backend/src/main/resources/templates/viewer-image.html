<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/viewer-shell :: head(${fileName})}"></head>
<body>
    <div th:replace="~{fragments/viewer-shell :: toolbar}"></div>

    <div class="viewer-content" data-file-url="" th:data-file-url="${fileContentUrl}">
        <div class="image-container">
            <img id="preview-image" th:src="${fileContentUrl}" th:alt="${fileName}"/>
        </div>
    </div>

    <div th:replace="~{fragments/viewer-shell :: statusbar}"></div>

    <style>
        .image-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            overflow: auto;
            padding: 20px;
            background: #e0e0e0;
            /* 棋盘格背景（透明图片显示用） */
            background-image: linear-gradient(45deg, #ccc 25%, transparent 25%),
                              linear-gradient(-45deg, #ccc 25%, transparent 25%),
                              linear-gradient(45deg, transparent 75%, #ccc 75%),
                              linear-gradient(-45deg, transparent 75%, #ccc 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }
        #preview-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
            cursor: zoom-in;
        }
        #preview-image.zoomed {
            max-width: none;
            max-height: none;
            cursor: zoom-out;
        }
    </style>

    <script th:replace="~{fragments/viewer-shell :: scripts}"></script>
    <script>
        const img = document.getElementById('preview-image');
        let scale = 1;

        img.addEventListener('click', () => {
            img.classList.toggle('zoomed');
            if (img.classList.contains('zoomed')) {
                scale = 2;
                img.style.transform = `scale(${scale})`;
            } else {
                scale = 1;
                img.style.transform = 'scale(1)';
            }
        });

        // 滚轮缩放
        document.querySelector('.image-container').addEventListener('wheel', (e) => {
            e.preventDefault();
            scale += e.deltaY > 0 ? -0.1 : 0.1;
            scale = Math.max(0.1, Math.min(5, scale));
            img.style.transform = `scale(${scale})`;
            if (scale !== 1) {
                img.classList.add('zoomed');
            }
        });
    </script>
</body>
</html>
