<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/viewer-shell :: head(${fileName})}"></head>
<body>
    <div th:replace="~{fragments/viewer-shell :: toolbar}"></div>

    <div class="viewer-content" data-file-url="" th:data-file-url="${fileContentUrl}">
        <div class="unsupported-container">
            <svg viewBox="0 0 24 24" width="80" height="80" fill="none" stroke="#999" stroke-width="1.5">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14,2 14,8 20,8"/>
                <line x1="9" y1="15" x2="15" y2="15"/>
            </svg>
            <h2>不支持预览此文件格式</h2>
            <p class="file-info">
                <span th:text="${fileName}">file.xyz</span>
                <span class="separator">·</span>
                <span th:text="${#strings.toUpperCase(fileType)}">XYZ</span>
            </p>
            <a class="btn-download" th:href="${fileContentUrl}">下载文件</a>
        </div>
    </div>

    <div th:replace="~{fragments/viewer-shell :: statusbar}"></div>

    <style>
        .unsupported-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 16px;
            color: #666;
        }
        .unsupported-container h2 { font-weight: 500; color: #444; }
        .file-info { color: #999; font-size: 14px; }
        .file-info .separator { margin: 0 8px; }
        .btn-download {
            display: inline-block;
            margin-top: 12px;
            padding: 10px 28px;
            background: #4caf50;
            color: #fff;
            text-decoration: none;
            border-radius: 4px;
            font-size: 14px;
            transition: background 0.2s;
        }
        .btn-download:hover { background: #388e3c; }
    </style>

    <script th:replace="~{fragments/viewer-shell :: scripts}"></script>
</body>
</html>
