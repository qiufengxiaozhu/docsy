<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/viewer-shell :: head(${fileName})}"></head>
<body>
    <div th:replace="~{fragments/viewer-shell :: toolbar}"></div>

    <div class="viewer-content" data-file-url="" th:data-file-url="${fileContentUrl}">
        <!-- Markdown 渲染区域（仅 .md 文件） -->
        <div id="markdown-view" class="markdown-body" style="display:none;"></div>
        <!-- 代码/文本区域 -->
        <pre id="code-view"><code id="code-content"></code></pre>
    </div>

    <div th:replace="~{fragments/viewer-shell :: statusbar}"></div>

    <style>
        #code-view {
            margin: 0;
            padding: 20px 24px;
            background: #fafafa;
            font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 14px;
            line-height: 1.6;
            overflow: auto;
            height: 100%;
            tab-size: 4;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        #code-view code {
            color: #333;
        }
        .markdown-body {
            padding: 32px 48px;
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            min-height: 100%;
            font-size: 15px;
            line-height: 1.8;
            color: #333;
        }
        .markdown-body h1, .markdown-body h2, .markdown-body h3 {
            margin-top: 24px;
            margin-bottom: 12px;
            border-bottom: 1px solid #eee;
            padding-bottom: 8px;
        }
        .markdown-body pre {
            background: #f6f8fa;
            padding: 16px;
            border-radius: 6px;
            overflow-x: auto;
        }
        .markdown-body code {
            background: #f0f0f0;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 0.9em;
        }
        .markdown-body pre code { background: none; padding: 0; }
        .markdown-body blockquote {
            border-left: 4px solid #dfe2e5;
            padding: 0 16px;
            color: #6a737d;
            margin: 12px 0;
        }
        .markdown-body table {
            border-collapse: collapse;
            width: 100%;
            margin: 12px 0;
        }
        .markdown-body th, .markdown-body td {
            border: 1px solid #ddd;
            padding: 8px 12px;
            text-align: left;
        }
        .markdown-body th { background: #f6f8fa; font-weight: 600; }
        .markdown-body img { max-width: 100%; }
        .markdown-body a { color: #0366d6; text-decoration: none; }
        .markdown-body a:hover { text-decoration: underline; }
    </style>

    <!-- 使用 marked.js 渲染 Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <script th:replace="~{fragments/viewer-shell :: scripts}"></script>
    <script th:inline="javascript">
        /*<![CDATA[*/
        const fileContentUrl = /*[[${fileContentUrl}]]*/ '';
        const fileType = /*[[${fileType}]]*/ '';

        (async () => {
            try {
                const resp = await fetch(fileContentUrl);
                const text = await resp.text();

                if (fileType === 'md') {
                    // Markdown 渲染
                    const mdView = document.getElementById('markdown-view');
                    mdView.innerHTML = marked.parse(text);
                    mdView.style.display = 'block';
                    document.getElementById('code-view').style.display = 'none';
                } else {
                    // 代码/文本显示
                    document.getElementById('code-content').textContent = text;
                }
            } catch (err) {
                document.getElementById('code-content').textContent = '加载失败: ' + err.message;
            }
        })();
        /*]]>*/
    </script>
</body>
</html>
