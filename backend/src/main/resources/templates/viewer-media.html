<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/viewer-shell :: head(${fileName})}"></head>
<body>
    <div th:replace="~{fragments/viewer-shell :: toolbar}"></div>

    <div class="viewer-content" data-file-url="" th:data-file-url="${fileContentUrl}">
        <div class="media-container">
            <!-- 视频 -->
            <video th:if="${#lists.contains({'mp4','webm','mkv','avi','mov','flv'}, fileType)}"
                   id="media-player" controls autoplay
                   th:src="${fileContentUrl}">
                您的浏览器不支持 video 标签
            </video>
            <!-- 音频 -->
            <div th:unless="${#lists.contains({'mp4','webm','mkv','avi','mov','flv'}, fileType)}" class="audio-wrapper">
                <div class="audio-visual">
                    <svg viewBox="0 0 100 100" width="120" height="120">
                        <circle cx="50" cy="50" r="45" fill="none" stroke="#4caf50" stroke-width="3"/>
                        <polygon points="40,30 40,70 75,50" fill="#4caf50"/>
                    </svg>
                </div>
                <audio id="media-player" controls autoplay th:src="${fileContentUrl}">
                    您的浏览器不支持 audio 标签
                </audio>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/viewer-shell :: statusbar}"></div>

    <style>
        .media-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            background: #1a1a1a;
        }
        video {
            max-width: 100%;
            max-height: 100%;
            outline: none;
        }
        .audio-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }
        .audio-visual {
            opacity: 0.8;
        }
        audio {
            width: 400px;
            max-width: 90vw;
        }
    </style>

    <script th:replace="~{fragments/viewer-shell :: scripts}"></script>
</body>
</html>
