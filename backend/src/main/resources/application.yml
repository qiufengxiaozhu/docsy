server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: docsy
  # 默认 SQLite 数据源
  datasource:
    url: jdbc:sqlite:${docsy.data-dir:./data}/docsy.db
    driver-class-name: org.sqlite.JDBC
    # SQLite 不需要用户名密码
  # Thymeleaf 模板引擎
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    cache: false
  # 文件上传限制
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB
  # Jackson
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    # 驼峰命名映射（app_id -> appId）
    map-underscore-to-camel-case: true
    # 开发环境打印 SQL
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# Docsy 自定义配置
docsy:
  # 数据目录（SQLite 数据库、上传文件等）
  data-dir: ./data
  # 文件存储路径
  file-store: ${docsy.data-dir}/files
  # JWT 配置
  jwt:
    secret: ${DOCSY_JWT_SECRET:docsy-default-jwt-secret-please-change-in-production-2024}
    expiration: 86400000  # 24小时（毫秒）
  # 三方应用签名有效期（秒）
  sign-expire-seconds: 300
  # 预览会话过期时间（分钟）
  session-expire-minutes: 120
  # OnlyOffice WASM 静态资源路径（文件系统路径，相对于应用运行目录）
  # 开发环境（从 backend/ 启动）: file:../onlyoffice/
  # Docker/生产环境: file:/opt/docsy/onlyoffice/
  onlyoffice-path: file:../onlyoffice/
  # OnlyOffice 定制化资源路径（优先级高于 onlyoffice-path）
  onlyoffice-custom-path: file:../onlyoffice-custom/

# Actuator 健康检查
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

# 日志配置
logging:
  level:
    root: INFO
    com.docsy: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%logger{36}] - %msg%n"

---
# ===== MySQL Profile =====
spring:
  config:
    activate:
      on-profile: mysql
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:docsy}?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:}

# MySQL 环境下关闭 SQL 日志（生产环境）
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
